<div class="register-page">

  <div class="register-card">

    <h1>
      Choose Account Type
    </h1>

    <p>
      Select the type of account
      you want to create.
    </p>

    <div class="register-options">

      <a
        routerLink="/register/client"
        class="register-option"
      >

        <h2>
          Client
        </h2>

        <p>
          Shop products and place orders.
        </p>

      </a>

      <a
        routerLink="/register/supermarket"
        class="register-option"
      >

        <h2>
          Supermarket
        </h2>

        <p>
          Sell products in the marketplace.
        </p>

      </a>

      <a
        routerLink="/register/courier"
        class="register-option"
      >

        <h2>
          Courier
        </h2>

        <p>
          Deliver customer orders.
        </p>

      </a>

    </div>

  </div>

</div>
