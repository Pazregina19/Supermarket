<div class="card">

  <div class="card-header">

    <h2 class="card-title">
      Admin Registration
    </h2>

  </div>

  <div class="card-content">

    <form class="form">

      <div class="form-field">

        <input
          class="input"
          placeholder="Username"
          [(ngModel)]="username"
          name="username"
          required
        />

      </div>

      <div class="form-field">

        <input
          class="input"
          type="email"
          placeholder="Email"
          [(ngModel)]="email"
          name="email"
          required
        />

      </div>

      <div class="form-field">

        <input
          class="input"
          type="password"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
        />

      </div>

    </form>

  </div>

  <div class="card-actions">

    <button
      class="button primary"
      (click)="register()"
    >
      Register Admin
    </button>

  </div>

</div>
