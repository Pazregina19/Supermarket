<h2>
  Pending Supermarket Approvals
</h2>

<div *ngIf="loading">

  Loading...

</div>

<div
  *ngIf="
    !loading &&
    pendingSupermarkets.length === 0
  "
>

  No pending supermarkets.

</div>

<div
  class="supermarkets-grid"

  *ngIf="
    !loading &&
    pendingSupermarkets.length > 0
  "
>

  <div
    class="supermarket-card"

    *ngFor="
      let supermarket of pendingSupermarkets
    "
  >

    <h3>

      {{ supermarket.name }}

    </h3>

    <p>

      {{ supermarket.description }}

    </p>

    <p>

      {{ supermarket.location }}

    </p>

    <button
      (click)="approveSupermarket(
        supermarket._id
      )"
    >

      Approve

    </button>

  </div>

</div>
