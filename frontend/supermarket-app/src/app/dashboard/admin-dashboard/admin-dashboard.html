<div class="dashboard-page">

  <h1>
    Admin Dashboard
  </h1>

  <div class="stats-grid">

    <div class="stat-card">

      <h2>
        {{ pendingSupermarkets.length }}
      </h2>

      <p>
        Pending Supermarkets
      </p>

    </div>

  </div>

  <div class="section-title">

    Pending Supermarket Approvals

  </div>

  <div
    *ngIf="loading"
    class="loading"
  >
    Loading...
  </div>

  <div
    *ngIf="
      !loading &&
      pendingSupermarkets.length === 0
    "
    class="empty-message"
  >
    No pending supermarkets.
  </div>

  <div class="supermarkets-grid">

    <div
      class="supermarket-card"

      *ngFor="
        let supermarket of
        pendingSupermarkets
      "
    >

      <h2>
        {{ supermarket.name }}
      </h2>

      <p>
        {{ supermarket.description }}
      </p>

      <p>
        <strong>City:</strong>
        {{ supermarket.location?.city }}
      </p>

      <p>
        <strong>Schedule:</strong>
        {{ supermarket.schedule }}
      </p>

      <button
        (click)="approveSupermarket(
          supermarket._id
        )"
      >
        Approve
      </button>

    </div>

  </div>

</div>
