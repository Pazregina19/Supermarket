<div class="dashboard-page">

  <h1>
    Courier Dashboard
  </h1>

  <div
    *ngIf="loading"
    class="loading"
  >

    Loading deliveries...

  </div>

  <div
    *ngIf="
      !loading &&
      deliveries.length === 0
    "
    class="empty"
  >

    No deliveries available.

  </div>

  <div class="deliveries-grid">

    <div
      class="delivery-card"

      *ngFor="
        let delivery of deliveries
      "
    >

      <h2>
        Delivery
      </h2>

      <p>

        Status:
        <strong>
          {{ delivery.status }}
        </strong>

      </p>

      <p>

        Method:
        {{ delivery.deliveryMethod }}

      </p>

      <p>

        Cost:
        €{{ delivery.deliveryCost }}

      </p>

      <button
        (click)="acceptDelivery(
          delivery._id
        )"
      >

        Accept Delivery

      </button>

    </div>

  </div>

</div>
