<div class="supermarkets-page">

  <div class="page-header">

    <h1>
      Supermarkets
    </h1>

    <p>
      Explore available supermarkets
      in the marketplace.
    </p>

  </div>

  <div
    *ngIf="loading"
    class="loading"
  >

    Loading supermarkets...

  </div>

  <div
    class="supermarkets-grid"

    *ngIf="
      !loading &&
      supermarkets.length > 0
    "
  >

    <div
      class="supermarket-card"

      *ngFor="
        let supermarket of supermarkets
      "
    >

      <h2>

        {{ supermarket.name }}

      </h2>

      <p class="description">

        {{ supermarket.description }}

      </p>

      <p>

        <strong>
          Location:
        </strong>

        {{ supermarket.location }}
      </p>

      <p>

        <strong>
          Delivery Cost:
        </strong>

        €{{ supermarket.deliveryCost }}
      </p>

      <p>

        <strong>
          Status:
        </strong>

        <span
          [ngClass]="
            supermarket.approved
            ? 'approved'
            : 'pending'
          "
        >

          {{
            supermarket.approved
            ? 'Approved'
            : 'Pending'
          }}

        </span>

      </p>

    </div>

  </div>

</div>
