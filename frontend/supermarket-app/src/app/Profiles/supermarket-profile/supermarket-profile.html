<div
  *ngIf="loading"
  class="loading"
>
  Loading profile...
</div>

<div
  *ngIf="!loading"
  class="profile-page"
>

  <div class="profile-card">

    <h1>
      Supermarket Profile
    </h1>

    <div class="profile-info">

      <p>
        <strong>Username:</strong>
        {{ user?.username }}
      </p>

      <p>
        <strong>Email:</strong>
        {{ user?.email }}
      </p>

      <p>
        <strong>Role:</strong>
        {{ user?.role }}
      </p>

    </div>

  </div>

</div>
