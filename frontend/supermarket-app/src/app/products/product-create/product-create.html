<div class="form-container">

  <h1>Add Product</h1>

  <div class="form-group">

    <label>Name</label>

    <input
      type="text"
      [(ngModel)]="name"
    >

  </div>

  <div class="form-group">

    <label>Description</label>

    <textarea
      [(ngModel)]="description"
    ></textarea>

  </div>

  <div class="form-group">

    <label>Category</label>

    <input
      type="text"
      [(ngModel)]="category"
    >

  </div>

  <div class="form-group">

    <label>Price</label>

    <input
      type="number"
      [(ngModel)]="price"
    >

  </div>

  <div class="form-group">

    <label>Stock</label>

    <input
      type="number"
      [(ngModel)]="stock"
    >

  </div>

  <div class="form-group">

    <label>Image</label>

    <input
      type="text"
      [(ngModel)]="image"
      placeholder="banana.jpg"
    >

  </div>

  <button
    (click)="save()"
  >
    Save Product
  </button>

</div>
