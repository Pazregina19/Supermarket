<div class="detail-page">

  <div *ngIf="loading">

    Loading product...

  </div>

  <div
    *ngIf="
      !loading &&
      product
    "
    class="detail-card"
  >

    <h1>

      {{ product.name }}

    </h1>

    <p>

      {{ product.description }}

    </p>

    <p>

      Price:
      €{{ product.price }}

    </p>

    <p
      *ngIf="
        product.supermarket
      "
    >

      Supermarket:
      {{ product.supermarket.name }}

    </p>

    <button>

      Add to Cart

    </button>

  </div>

</div>
